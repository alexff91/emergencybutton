name: emergencybutton
description: >-
  Personal safety app with one-tap emergency calling, GPS location sharing
  with Plus Codes, medical info card, and customizable emergency contacts.
  Supports multiple alert types (medical, fire, police) with countdown timer.

publish_to: 'none'
version: 4.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  flutter_phone_direct_caller: ^2.1.1
  maps_launcher: ^2.2.1
  auto_size_text: ^3.0.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
